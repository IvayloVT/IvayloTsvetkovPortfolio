<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ivaylo Tsvetkov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3482f6;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light-blue: #f8fbff;
            /* Brand Colors */
            --linkedin: #0077b5;
            --github: #24292e;
            --instagram: #e4405f;
            --gmail: #ea4335; /* Added Google Red */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: #fafafa;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- HEADER --- */
        .site-header {
            padding: 24px 0;
            background-color: var(--bg-light-blue);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 24px;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-links a.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 4px;
        }

        /* --- CONTACT HERO --- */
        .hero {
            background-color: rgb(146, 193, 237); /* Matches provided rgb */
            padding: 80px 0;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .hero-sub {
            font-size: 1.1rem;
            color: #334155;
            margin-bottom: 32px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- CONTACT CONTENT --- */
        .contact-info {
            padding: 80px 0;
            text-align: center;
        }

        .email-link {
            display: inline-block;
            font-size: 1.8rem;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 60px;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .email-link:hover {
            border-bottom: 2px solid var(--primary-blue);
            transform: translateY(-2px);
        }

        /* --- HORIZONTAL BANNER BUTTONS --- */
        .social-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
        }

        .social-card {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 24px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-left: 6px solid #e2e8f0; /* Default border color */
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s ease;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .social-card i {
            font-size: 1.8rem;
            margin-right: 20px;
            width: 30px;
            text-align: center;
        }

        .social-card span {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Brand Colors & Hover States */
        .social-card.gmail { border-left-color: var(--gmail); }
        .social-card.linkedin { border-left-color: var(--linkedin); }
        .social-card.github { border-left-color: var(--github); }
        .social-card.instagram { border-left-color: var(--instagram); }

        .social-card:hover {
            transform: translateX(10px);
            background-color: var(--bg-light-blue);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .social-card.gmail:hover i { color: var(--gmail); }
        .social-card.linkedin:hover i { color: var(--linkedin); }
        .social-card.github:hover i { color: var(--github); }
        .social-card.instagram:hover i { color: var(--instagram); }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .email-link { font-size: 1.3rem; }
            .social-grid { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">IVAYLO TSVETKOV</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Get in Touch</h1>
            <p class="hero-sub">I am always open to discussing new technical projects or architectural challenges. Let's build the digital defenses of tomorrow together.</p>
        </div>
    </section>

    <main class="container contact-info">
    
        <div class="social-grid">
            <a href="mailto:ivaylovt@gmail.com" class="social-card gmail">
                <i class="fas fa-envelope"></i>
                <span>Send an Email</span>
            </a>

            <a href="https://www.linkedin.com/in/ivaylo-tsvetkov-576b6699/" target="_blank" class="social-card linkedin">
                <i class="fab fa-linkedin"></i>
                <span>Connect on LinkedIn</span>
            </a>

            <a href="https://github.com/IvayloVT" target="_blank" class="social-card github">
                <i class="fab fa-github"></i>    
                <span>Follow on GitHub</span>
            </a>

            <a href="https://www.instagram.com/ivaylo.tsvetkov.1/" target="_blank" class="social-card instagram">
                <i class="fab fa-instagram"></i>
                <span>Follow on Instagram</span>
            </a>
        </div>
    </main>

</body>
</html>
