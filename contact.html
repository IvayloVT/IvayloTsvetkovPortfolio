<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ivaylo Tsvetkov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3482f6;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light-blue: #f8fbff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- HEADER --- */
        .site-header {
            padding: 24px 0;
            background-color: var(--bg-light-blue);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 24px;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-links a.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 4px;
        }

        /* --- CONTACT HERO --- */
        .hero {
            background-color: rgb(146, 193, 237);
            padding: 80px 0;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .hero-sub {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- CONTACT CONTENT --- */
        .contact-info {
            padding: 80px 0;
            text-align: center;
        }

        .email-link {
            display: block;
            font-size: 1.8rem;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 40px;
            transition: 0.3s;
        }

        .email-link:hover {
            opacity: 0.7;
        }

        /* --- SOCIAL BUTTONS --- */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .social-icon {
            font-size: 2rem;
            color: var(--text-dark);
            transition: transform 0.3s, color 0.3s;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: translateY(-5px);
        }

        /* Brand Colors on Hover */
        .social-icon.linkedin:hover { color: #0077b5; }
        .social-icon.github:hover { color: #333; }
        .social-icon.instagram:hover { color: #e4405f; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .email-link { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">IVAYLO TSVETKOV</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Get in Touch</h1>
            <p class="hero-sub">I am always open to discussing new technical projects or architectural challenges. Let's build the digital defenses of tomorrow together.</p>
        </div>
    </section>

    <main class="container contact-info">
        <a href="mailto:ivaylovt@gmail.com" class="email-link">ivaylovt@gmail.com</a>
        
        <div class="social-links">
            <a href="https://www.linkedin.com/in/ivaylo-tsvetkov-576b6699/" target="_blank" class="social-icon linkedin" title="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://github.com/IvayloVT" target="_blank" class="social-icon github" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://www.instagram.com/ivaylo.tsvetkov.1/" target="_blank" class="social-icon instagram" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </main>

</body>
</html>
